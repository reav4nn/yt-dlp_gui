name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          # Download yt-dlp
          Invoke-WebRequest -Uri 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe' -OutFile bin\yt-dlp.exe
          
          # Download ffmpeg (essentials)
          Invoke-WebRequest -Uri 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip' -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1
          Copy-Item $ff.FullName -Destination bin
          Copy-Item $fp.FullName -Destination bin

      - name: Prepare binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p bin
          # Download yt-dlp linux binary
          wget https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -O bin/yt-dlp
          # Download ffmpeg static build
          wget https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffmpeg-6.1-linux-64.zip -O ffmpeg.zip
          unzip ffmpeg.zip -d bin/
          # Ensure they are executable
          chmod +x bin/yt-dlp bin/ffmpeg
          # ffprobe is often needed by yt-dlp for certain formats
          wget https://github.com/ffbinaries/ffbinaries-prebuilt/releases/download/v6.1/ffprobe-6.1-linux-64.zip -O ffprobe.zip
          unzip ffprobe.zip -d bin/
          chmod +x bin/ffprobe

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name yt-dlp-gui-windows --add-binary "bin\yt-dlp.exe;." --add-binary "bin\ffmpeg.exe;." --add-binary "bin\ffprobe.exe;." main.py

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --onefile --name yt-dlp-gui-linux --add-binary "bin/yt-dlp:." --add-binary "bin/ffmpeg:." --add-binary "bin/ffprobe:." main.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yt-dlp-gui-windows.exe
            dist/yt-dlp-gui-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}