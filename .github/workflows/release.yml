name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin

          # download yt-dlp
          $ytdlpUrl = 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe'
          Invoke-WebRequest -Uri $ytdlpUrl -OutFile bin\yt-dlp.exe

          # try to fetch checksum for yt-dlp from several common locations
          $ytdlpChecksumUrls = @( 
            'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe.sha256',
            'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.sha256',
            'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.sha256sum',
            'https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA256SUMS'
          )

          function Get-RemoteChecksum($urls, $name) {
            foreach ($u in $urls) {
              try {
                $resp = Invoke-WebRequest -Uri $u -UseBasicParsing -ErrorAction Stop
                if ($resp.StatusCode -eq 200 -or $resp.RawContent) {
                  $txt = $resp.Content -replace "\r", "" -split "\n"
                  foreach ($line in $txt) {
                    if ($line -match "^([0-9a-fA-F]{64})\b") { return $matches[1] }
                    if ($line -match "^([0-9a-fA-F]{64}).*\b$name\b") { return $matches[1] }
                    if ($line -match "^([0-9a-fA-F]{64})\s+\*?$name") { return $matches[1] }
                  }
                }
              } catch { }
            }
            return $null
          }

          $expected = Get-RemoteChecksum $ytdlpChecksumUrls 'yt-dlp.exe'
          if (-not $expected) { $expected = Get-RemoteChecksum $ytdlpChecksumUrls 'yt-dlp' }
          if (-not $expected) { Write-Host 'Warning: no yt-dlp checksum found; failing for strict verification' ; exit 1 }

          $actual = (Get-FileHash bin\yt-dlp.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected.ToLower()) { Write-Host "yt-dlp checksum mismatch: $actual != $expected" ; exit 1 }

          # download ffmpeg (essentials build) and extract
          $ffUrl = 'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip'
          Invoke-WebRequest -Uri $ffUrl -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $ff = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $fp = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ff -or -not $fp) { Write-Host 'ffmpeg binaries not found in archive' ; exit 1 }
          Copy-Item $ff.FullName -Destination bin
          Copy-Item $fp.FullName -Destination bin

          # attempt to verify ffmpeg using common checksum files (gyan hosts checksums on its site but paths vary)
          $ffChecksumUrls = @( 
            'https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip.sha256',
            'https://www.gyan.dev/ffmpeg/builds/sha256sums.txt'
          )
          $expected_ff = Get-RemoteChecksum $ffChecksumUrls 'ffmpeg-release-essentials.zip'
          if (-not $expected_ff) { Write-Host 'Warning: no ffmpeg zip checksum found; failing for strict verification' ; exit 1 }
          $actual_ff = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual_ff -ne $expected_ff.ToLower()) { Write-Host "ffmpeg checksum mismatch: $actual_ff != $expected_ff" ; exit 1 }

      - name: Prepare binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          mkdir -p bin

          # download official yt-dlp linux binary (latest release)
          curl -fSL -o bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
          chmod +x bin/yt-dlp

          # prefer official SHA2-256SUMS from the yt-dlp release; fallback to SHA256SUMS
          # Try possible current checksum file names from yt-dlp releases
          YTDLP_CHECK_URLS=(
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/sha256sums.txt"
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA2-256SUMS"
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/SHA256SUMS"
          )

          expected=''
          for u in "${YTDLP_CHECK_URLS[@]}"; do
            if curl -fsSL "$u" -o /tmp/yt-dlp.sha; then
              # look for an entry that references yt-dlp_linux first, then yt-dlp
              token=$(grep -Eo '[0-9a-fA-F]{64}\s+\S*yt-dlp_linux' /tmp/yt-dlp.sha | grep -Eo '[0-9a-fA-F]{64}' | head -n1 || true)
              if [ -z "$token" ]; then
                token=$(grep -Eo '[0-9a-fA-F]{64}\s+\S*yt-dlp' /tmp/yt-dlp.sha | grep -Eo '[0-9a-fA-F]{64}' | head -n1 || true)
              fi
              if [ -n "$token" ]; then expected="$token"; break; fi
            fi
          done

          if [ -z "$expected" ]; then echo "No yt-dlp checksum found; failing for strict verification" >&2; exit 1; fi
          actual=$(sha256sum bin/yt-dlp | awk '{print $1}')
          if [ "$actual" != "$expected" ]; then echo "yt-dlp checksum mismatch: $actual != $expected" >&2; exit 1; fi

          # download ffmpeg static build and its checksums (johnvansickle provides static builds and checksum file)
          curl -fSL -o ffmpeg.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          curl -fSL -o /tmp/ffmpeg.sha256s https://johnvansickle.com/ffmpeg/releases/sha256sums.txt
          tar -xJf ffmpeg.tar.xz
          find . -type f -name ffmpeg -exec cp {} bin/ \;
          find . -type f -name ffprobe -exec cp {} bin/ \;
          chmod +x bin/yt-dlp bin/ffmpeg bin/ffprobe || true
          # verify ffmpeg tar checksum using johnvansickle's sums
          expected_ff=$(grep -Eo '[0-9a-fA-F]{64}' /tmp/ffmpeg.sha256s | head -n1 || true)
          if [ -z "$expected_ff" ]; then echo "No ffmpeg checksum found; failing" >&2; exit 1; fi
          actual_ff=$(sha256sum ffmpeg.tar.xz | awk '{print $1}')
          if [ "$actual_ff" != "$expected_ff" ]; then echo "ffmpeg checksum mismatch" >&2; exit 1; fi

      - name: Install Python and build deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pyinstaller

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller --noconsole --onefile --name yt-dlp-gui-windows --add-binary "bin\yt-dlp.exe;." --add-binary "bin\ffmpeg.exe;." --add-binary "bin\ffprobe.exe;." main.py

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconsole --onefile --name yt-dlp-gui-linux --add-binary "bin/yt-dlp:." --add-binary "bin/ffmpeg:." --add-binary "bin/ffprobe:." main.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yt-dlp-gui-windows.exe
            dist/yt-dlp-gui-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}